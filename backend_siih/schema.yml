  /api/v1/citas/:
    get:
      operationId: v1_citas_list
      description: |-
        CRUD de citas.

        GET  /api/v1/citas/        → Listar (filtrable por fecha, médico, estado)
        POST /api/v1/citas/        → Crear cita (valida solapamiento)
        PATCH /api/v1/citas/{id}/  → Cambiar estado
      parameters:
      - in: query
        name: estado_cita
        schema:
          type: string
          enum:
          - Atendida
          - Cancelada
          - Confirmada
          - No Asistio
          - Pendiente
        description: |-
          * `Pendiente` - Pendiente
          * `Confirmada` - Confirmada
          * `Atendida` - Atendida
          * `Cancelada` - Cancelada
          * `No Asistio` - No Asistió
      - in: query
        name: fecha_cita
        schema:
          type: string
          format: date
      - in: query
        name: id_medico
        schema:
          type: integer
      - in: query
        name: id_paciente
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Qué campo usar para ordenar los resultados.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un término de búsqueda.
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCitaList'
          description: ''
