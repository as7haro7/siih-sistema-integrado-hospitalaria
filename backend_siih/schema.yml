components:
  schemas:
    AuditoriaSistema:
      type: object
      properties:
        id_auditoria:
          type: integer
          readOnly: true
        usuario_accion:
          type: string
          maxLength: 100
        tabla_afectada:
          type: string
          maxLength: 50
        id_registro_afectado:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        tipo_operacion:
          $ref: '#/components/schemas/TipoOperacionEnum'
        valores_anteriores:
          type: string
          nullable: true
        valores_nuevos:
          type: string
          nullable: true
        fecha_hora_evento:
          type: string
          format: date-time
          readOnly: true
        direccion_ip:
          type: string
          nullable: true
          maxLength: 45
      required:
      - fecha_hora_evento
      - id_auditoria
      - id_registro_afectado
      - tabla_afectada
      - tipo_operacion
      - usuario_accion
    BajaCreate:
      type: object
      description: Serializer para el endpoint de baja de paciente.
      properties:
        motivo_baja:
          type: string
    BajaCreateRequest:
      type: object
      description: Serializer para el endpoint de baja de paciente.
      properties:
        motivo_baja:
          type: string
    Cama:
      type: object
      properties:
        id_cama:
          type: integer
          readOnly: true
        nro_habitacion:
          type: string
          maxLength: 20
        nro_cama:
          type: string
          maxLength: 20
        id_tarifa:
          type: integer
        tipo_habitacion:
          type: string
          readOnly: true
        costo_por_dia:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        estado_cama:
          $ref: '#/components/schemas/EstadoCamaEnum'
      required:
      - costo_por_dia
      - id_cama
      - id_tarifa
      - nro_cama
      - nro_habitacion
      - tipo_habitacion
    CamaRequest:
      type: object
      properties:
        nro_habitacion:
          type: string
          minLength: 1
          maxLength: 20
        nro_cama:
          type: string
          minLength: 1
          maxLength: 20
        id_tarifa:
          type: integer
        estado_cama:
          $ref: '#/components/schemas/EstadoCamaEnum'
      required:
      - id_tarifa
      - nro_cama
      - nro_habitacion
    Cita:
      type: object
      properties:
        id_cita:
          type: integer
          readOnly: true
        id_paciente:
          type: integer
        paciente_nombre:
          type: string
          readOnly: true
        id_medico:
          type: integer
        medico_nombre:
          type: string
          readOnly: true
        fecha_cita:
          type: string
          format: date
        hora_cita:
          type: string
          format: time
        estado_cita:
          $ref: '#/components/schemas/EstadoCitaEnum'
      required:
      - fecha_cita
      - hora_cita
      - id_cita
      - id_medico
      - id_paciente
      - medico_nombre
      - paciente_nombre
    CitaRequest:
      type: object
      properties:
        id_paciente:
          type: integer
        id_medico:
          type: integer
        fecha_cita:
          type: string
          format: date
        hora_cita:
          type: string
          format: time
        estado_cita:
          $ref: '#/components/schemas/EstadoCitaEnum'
      required:
      - fecha_cita
      - hora_cita
      - id_medico
      - id_paciente
    CitaUpdate:
      type: object
      description: Solo permite cambiar el estado de la cita.
      properties:
        estado_cita:
          $ref: '#/components/schemas/EstadoCitaEnum'
    CitaUpdateRequest:
      type: object
      description: Solo permite cambiar el estado de la cita.
      properties:
        estado_cita:
          $ref: '#/components/schemas/EstadoCitaEnum'
    Compra:
      type: object
      properties:
        id_compra:
          type: integer
          readOnly: true
        id_proveedor:
          type: integer
        proveedor_nombre:
          type: string
          readOnly: true
        fecha_compra:
          type: string
          format: date
        numero_factura_compra:
          type: string
          nullable: true
          maxLength: 50
        total_compra:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        detalles:
          type: array
          items:
            $ref: '#/components/schemas/CompraDetalle'
          readOnly: true
      required:
      - detalles
      - fecha_compra
      - id_compra
      - id_proveedor
      - proveedor_nombre
    CompraCreate:
      type: object
      description: |-
        Serializer para registrar una compra con su lote asociado.
        Crea: COMPRA + LOTE_MEDICAMENTO + COMPRA_DETALLE en una sola operación.
      properties:
        id_proveedor:
          type: integer
        fecha_compra:
          type: string
          format: date
        numero_factura_compra:
          type: string
        id_medicamento:
          type: integer
        numero_lote:
          type: string
        cantidad:
          type: integer
          minimum: 1
        precio_compra_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        fecha_vencimiento:
          type: string
          format: date
      required:
      - cantidad
      - fecha_compra
      - fecha_vencimiento
      - id_medicamento
      - id_proveedor
      - precio_compra_unitario
    CompraCreateRequest:
      type: object
      description: |-
        Serializer para registrar una compra con su lote asociado.
        Crea: COMPRA + LOTE_MEDICAMENTO + COMPRA_DETALLE en una sola operación.
      properties:
        id_proveedor:
          type: integer
        fecha_compra:
          type: string
          format: date
        numero_factura_compra:
          type: string
        id_medicamento:
          type: integer
        numero_lote:
          type: string
        cantidad:
          type: integer
          minimum: 1
        precio_compra_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        fecha_vencimiento:
          type: string
          format: date
      required:
      - cantidad
      - fecha_compra
      - fecha_vencimiento
      - id_medicamento
      - id_proveedor
      - precio_compra_unitario
    CompraDetalle:
      type: object
      properties:
        id_compra_detalle:
          type: integer
          readOnly: true
        id_lote:
          type: integer
        cantidad:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        precio_unitario:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        subtotal_linea:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
