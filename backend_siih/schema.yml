openapi: 3.0.3
info:
  title: SIIH API
  version: 1.0.0
  description: API del Sistema Integrado de Información Hospitalaria (SIIH)
paths:
  /api/v1/auditoria/:
    get:
      operationId: v1_auditoria_list
      description: |-
        Consulta de registros de auditoría (solo lectura, solo Admin).

        GET /api/v1/auditoria/ → Listar registros (filtrable por tabla, usuario, tipo)
      parameters:
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      - in: query
        name: tabla_afectada
        schema:
          type: string
      - in: query
        name: tipo_operacion
        schema:
          type: string
          enum:
          - EDICION
          - ELIMINACION
          - INSERCION
          - LECTURA
        description: |-
          * `INSERCION` - Inserción
          * `LECTURA` - Lectura
          * `EDICION` - Edición
          * `ELIMINACION` - Eliminación
      - in: query
        name: usuario_accion
        schema:
          type: string
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuditoriaSistemaList'
          description: ''
  /api/v1/auditoria/{id_auditoria}/:
    get:
      operationId: v1_auditoria_retrieve
      description: |-
        Consulta de registros de auditoría (solo lectura, solo Admin).

        GET /api/v1/auditoria/ → Listar registros (filtrable por tabla, usuario, tipo)
      parameters:
      - in: path
        name: id_auditoria
        schema:
          type: integer
        description: Un valor de entero único que identifique este Registro de auditoría.
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditoriaSistema'
          description: ''
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/camas/:
    get:
      operationId: v1_camas_list
      description: |-
        CRUD de camas.

        GET /api/v1/camas/disponibles/ → Camas con estado 'Disponible'
      parameters:
      - in: query
        name: estado_cama
        schema:
          type: string
          enum:
          - Disponible
          - Mantenimiento
          - Ocupada
        description: |-
          * `Disponible` - Disponible
          * `Ocupada` - Ocupada
          * `Mantenimiento` - Mantenimiento
      - in: query
        name: nro_habitacion
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un número de página dentro del conjunto de resultados paginado.
        schema:
          type: integer
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
