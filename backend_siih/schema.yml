            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompraList'
          description: ''
    post:
      operationId: v1_compras_create
      description: |-
        Crea COMPRA + LOTE_MEDICAMENTO + COMPRA_DETALLE en una transacción.
        El trigger trg_lote_incrementa_stock se encarga de actualizar stock_actual.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompraCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompraCreateRequest'
