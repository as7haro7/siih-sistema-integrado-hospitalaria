services:
  - type: web
    name: siih-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "localhost,127.0.0.1,siih-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:5173,https://siih-frontend.vercel.app"
      - key: DATABASE_URL
        sync: false # Debes llenar esto en el Dashboard de Render usando la URL que te da Aiven (mysql://user:pass@host:port/dbname)
